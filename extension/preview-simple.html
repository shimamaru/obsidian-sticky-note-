<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8e4f0; height: 100vh; font-family: -apple-system, "Helvetica Neue", sans-serif; overflow: hidden; }

#panel {
  width: 320px; min-width: 180px; min-height: 140px;
  background: #f5f0fc; border: 1px solid #d4c8e8; border-radius: 10px;
  box-shadow: 0 4px 24px rgba(146,100,182,0.13);
  display: flex; flex-direction: column; overflow: hidden; position: fixed;
}

.rh { position:absolute; z-index:10; }
.rh-n  { top:0;    left:8px;   right:8px;  height:5px; cursor:n-resize; }
.rh-s  { bottom:0; left:8px;   right:8px;  height:5px; cursor:s-resize; }
.rh-w  { top:8px;  bottom:8px; left:0;     width:5px;  cursor:w-resize; }
.rh-e  { top:8px;  bottom:8px; right:0;    width:5px;  cursor:e-resize; }
.rh-nw { top:0;  left:0;  width:10px; height:10px; cursor:nw-resize; }
.rh-ne { top:0;  right:0; width:10px; height:10px; cursor:ne-resize; }
.rh-sw { bottom:0; left:0;  width:10px; height:10px; cursor:sw-resize; }
.rh-se { bottom:0; right:0; width:10px; height:10px; cursor:se-resize; }

#header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; background:rgba(146,100,182,0.08);
  border-bottom:1px solid #d4c8e8; border-radius:10px 10px 0 0;
  cursor:grab; user-select:none; flex-shrink:0;
}
#header.locked { cursor:default; }
#title { font-size:12px; font-weight:500; color:#9264B6; letter-spacing:0.06em; }
#lock-btn { background:none; border:none; cursor:pointer; padding:2px; display:flex; align-items:center; opacity:0.5; }
#lock-btn:hover { opacity:1; }
#lock-btn svg { width:16px; height:16px; stroke:#9264B6; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

#body { display:flex; flex-direction:column; flex:1; padding:10px; gap:8px; overflow:hidden; min-height:0; }
textarea {
  flex:1; width:100%; font-family:inherit; font-size:14px; line-height:1.6;
  color:#37352f; background:transparent; border:none; outline:none; resize:none; min-height:0;
}
textarea::placeholder { color:#c4b8d8; }
#status { font-size:12px; color:#5a9e8f; min-height:16px; flex-shrink:0; }
#footer { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
#hint { font-size:11px; color:#b8a8d0; }
#save-btn {
  font-family:inherit; font-size:13px; font-weight:500;
  background:#9264B6; color:#fff; border:none; border-radius:6px; padding:5px 14px; cursor:pointer;
}
#save-btn:hover { background:#7a4fa0; }
#overlay { display:none; position:fixed; inset:0; z-index:9999; }
</style>
</head>
<body>
<div id="overlay"></div>
<div id="panel">
  <div class="rh rh-n" data-dir="n"></div><div class="rh rh-s" data-dir="s"></div>
  <div class="rh rh-w" data-dir="w"></div><div class="rh rh-e" data-dir="e"></div>
  <div class="rh rh-nw" data-dir="nw"></div><div class="rh rh-ne" data-dir="ne"></div>
  <div class="rh rh-sw" data-dir="sw"></div><div class="rh rh-se" data-dir="se"></div>
  <div id="header">
    <span id="title">Obsidian</span>
    <button id="lock-btn">
      <svg id="svg-locked" viewBox="0 0 24 24" style="display:none"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <svg id="svg-unlocked" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
    </button>
  </div>
  <div id="body">
    <textarea placeholder="メモを入力…"></textarea>
    <div id="status"></div>
    <div id="footer">
      <span id="hint">⌘ Enter で保存</span>
      <button id="save-btn">保存</button>
    </div>
  </div>
</div>
<script>
const panel = document.getElementById('panel');
const header = document.getElementById('header');
const overlay = document.getElementById('overlay');
const textarea = document.querySelector('textarea');
const status = document.getElementById('status');
const MIN_W = 180, MIN_H = 140;

panel.style.left = Math.round((window.innerWidth - 320) / 2) + 'px';
panel.style.top = '60px';

let locked = false;
document.getElementById('lock-btn').addEventListener('click', () => {
  locked = !locked;
  document.getElementById('svg-locked').style.display = locked ? '' : 'none';
  document.getElementById('svg-unlocked').style.display = locked ? 'none' : '';
  header.classList.toggle('locked', locked);
});

let mode = null, rDir = '', ox = 0, oy = 0, rSX = 0, rSY = 0, rSW = 0, rSH = 0, rSL = 0, rST = 0;
function startOp(cur) { overlay.style.display = 'block'; overlay.style.cursor = cur; document.body.style.userSelect = 'none'; }
function endOp() { overlay.style.display = 'none'; document.body.style.userSelect = ''; mode = null; }

header.addEventListener('mousedown', e => {
  if (locked) return;
  mode = 'drag'; const r = panel.getBoundingClientRect();
  ox = e.clientX - r.left; oy = e.clientY - r.top;
  startOp('grab'); e.preventDefault();
});
document.querySelectorAll('.rh').forEach(el => {
  el.addEventListener('mousedown', e => {
    mode = 'resize'; rDir = el.dataset.dir;
    rSX = e.clientX; rSY = e.clientY;
    const r = panel.getBoundingClientRect();
    rSW = r.width; rSH = r.height; rSL = r.left; rST = r.top;
    startOp(getComputedStyle(el).cursor); e.preventDefault(); e.stopPropagation();
  });
});
document.addEventListener('mousemove', e => {
  if (mode === 'drag') {
    const vw = window.innerWidth, vh = window.innerHeight;
    panel.style.left = Math.round(Math.max(0, Math.min(e.clientX - ox, vw - panel.offsetWidth))) + 'px';
    panel.style.top  = Math.round(Math.max(0, Math.min(e.clientY - oy, vh - panel.offsetHeight))) + 'px';
  } else if (mode === 'resize') {
    const dx = e.clientX - rSX, dy = e.clientY - rSY;
    let w = rSW, h = rSH, l = rSL, t = rST;
    if (rDir.includes('e')) w = Math.max(MIN_W, rSW + dx);
    if (rDir.includes('s')) h = Math.max(MIN_H, rSH + dy);
    if (rDir.includes('w')) { w = Math.max(MIN_W, rSW - dx); l = rSL + rSW - w; }
    if (rDir.includes('n')) { h = Math.max(MIN_H, rSH - dy); t = rST + rSH - h; }
    panel.style.width = Math.round(w) + 'px'; panel.style.height = Math.round(h) + 'px';
    panel.style.left  = Math.round(l) + 'px'; panel.style.top    = Math.round(t) + 'px';
  }
});
document.addEventListener('mouseup', endOp);

document.getElementById('save-btn').addEventListener('click', () => {
  const text = textarea.value.trim(); if (!text) return;
  status.textContent = '✓ 保存しました'; textarea.value = '';
  setTimeout(() => { status.textContent = ''; }, 1500);
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) document.getElementById('save-btn').click();
});
</script>
</body>
</html>
